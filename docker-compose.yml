services:
  frontend:
    build: ./frontend
    container_name: import_excel_frontend
    ports:
      - "3001:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    container_name: import_excel_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: always